{% extends 'flagd/base.html' %}
{% load staticfiles %}

{% block title_block %}
    Sign Up
{% endblock %}


{% block body_block %}
<h1>Sign Up</h1>
{% if registered %}
Thanks for signing up!
<a href="{% url 'flagd:user_profile' user.username %}">Go to profile page</a><br />

{% else %}
<form id="user_form" method="post" action="{% url 'flagd:sign_up' %}" enctype="multipart/form-data">
    {% csrf_token %}
    {{ user_form.as_p }}
    {{ profile_form.as_p }}

    <input type="submit" name="submit" value="Sign Up" />
</form>
{% endif %}
{% endblock %}
