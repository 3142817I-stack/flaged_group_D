{% extends 'flagd/base.html' %}
{% load staticfiles %}

{% block title_block %}
    Play {{ mode_name }} Mode
{% endblock %}

{% block body_block %}
    <div class="container py-4">
        <div class="row mb-4">
            <div class="col-12 text-center">
                <h1 id="mode-title" class="display-4 fw-bold text-white mb-2">{{ mode_name }} Mode</h1>
                <p class="text-white-50">Guess the Flag!</p>
            </div>
        </div>

        <div class="mb-3">
            <a href="{% url 'flagd:play' %}" id="back-link" class="text-white text-decoration-none">
                &larr; Back to Mode Selection
            </a>
        </div>

        <div id="game-content">
            <!-- Game content will be loaded here -->
        </div>
        
        <div id="no-flags-message" class="text-center text-white" style="display: none;">
            <div class="card bg-white bg-opacity-75 p-4">
                <p>No flags available for <span id="no-flags-mode"></span> mode. Please contact an administrator.</p>
            </div>
        </div>
    </div>

    <!-- Pass initial data to JavaScript -->
    <script>
        window.initialGameData = {% if initial_data_json %}{{ initial_data_json|safe }}{% else %}null{% endif %};
        window.backUrl = "{% url 'flagd:play' %}";
    </script>
    <script src="{% static 'js/play_game.js' %}"></script>
{% endblock %}
